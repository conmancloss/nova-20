<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c8d6e5"/>
      <stop offset="100%" stop-color="#7f8c9a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.15"/>
  <circle cx="50" cy="50" r="32" fill="none" stroke="#c8d6e5" stroke-width="0.3" stroke-opacity="0.1"/>

  <!-- Star burst rays -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Long rays -->
    <line x1="50" y1="10" x2="50" y2="90" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.2"/>
    <line x1="10" y1="50" x2="90" y2="50" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.2"/>
    <!-- Diagonal rays -->
    <line x1="21" y1="21" x2="79" y2="79" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.15"/>
    <line x1="79" y1="21" x2="21" y2="79" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.15"/>
    <!-- Short rays -->
    <line x1="50" y1="18" x2="50" y2="26" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="50" y1="74" x2="50" y2="82" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="18" y1="50" x2="26" y2="50" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5"/>
    <line x1="74" y1="50" x2="82" y2="50" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.5"/>
  </g>

  <!-- Nova explosion shape - 4-point star -->
  <g filter="url(#softglow)">
    <path d="M50,22 C51,36 64,49 78,50 C64,51 51,64 50,78 C49,64 36,51 22,50 C36,49 49,36 50,22Z" 
          fill="url(#coreGrad)" opacity="0.9"/>
  </g>

  <!-- Inner bright core -->
  <circle cx="50" cy="50" r="7" fill="url(#coreGrad)" filter="url(#softglow)"/>
  <circle cx="50" cy="50" r="3.5" fill="#ffffff" opacity="0.95"/>

  <!-- Tiny stars scattered -->
  <circle cx="20" cy="22" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="78" cy="18" r="0.6" fill="#c8d6e5" opacity="0.5"/>
  <circle cx="82" cy="72" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="16" cy="68" r="0.9" fill="#c8d6e5" opacity="0.5"/>
  <circle cx="60" cy="14" r="0.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="35" cy="82" r="0.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="85" cy="38" r="0.5" fill="#c8d6e5" opacity="0.5"/>
</svg>
